auth:
  email: ""
  password: ""
  cookie: ""

# API key can also be set via .env file:
#   echo 'OPENCODE_GO_API_KEY=your-key' > .env

gradescope:
  base_url: "https://www.gradescope.com"
  course_id: null
  request_delay: 1.0
  max_retries: 3

llm:
  provider: "opencode-go"
  model: "deepseek-v4-flash"
  multimodal_model: "mimo-v2.5"
  api_key: "${OPENCODE_GO_API_KEY}"
  base_url: "https://opencode.ai/zen/go/v1"
  temperature: 0.1
  max_tokens: 4096

lmstudio:
  base_url: "http://localhost:1234/v1"
  auto_discover: true
  default_model: ""

pdf_input:
  path: ""
  question_separator: "## Question"

rubric:
  path: "config/rubrics/"
  default_rubric: "default_rubric.yaml"

workflow:
  auto_upload: false
  review_threshold: 0.7
  batch_size: 50

output:
  grades_dir: "data/output/grades/"
  format: "gradescope_csv"
  generate_feedback: true
