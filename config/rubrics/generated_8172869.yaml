questions:
- id: q1
  max_points: 15
  rubric:
  - description: "Correctly translates 'There is a person such that if he drinks,\
      \ everyone drinks' into \u2203x(Drinks(x) \u2192 \u2200y Drinks(y))"
    name: Translation into first-order logic
    points: 5
  - description: 'Considers both cases: everyone drinks, and not everyone drinks'
    name: Case analysis
    points: 5
  - description: Correctly argues that in each case the implication holds, showing
      validity
    name: Logical reasoning
    points: 5
  title: Question 1
  type: short_answer
- id: q2
  max_points: 15
  rubric:
  - description: Begins with negation of formula and applies duality rules correctly
    name: Starting the tableau
    points: 3
  - description: Correctly applies rules for negated implication, existential instantiation,
      and universal instantiation
    name: Application of propositional rules
    points: 6
  - description: Introduces fresh constants appropriately for existential and universal
      quantifiers
    name: Handling of constants
    points: 3
  - description: "Correctly identifies contradiction (D(a2) and \xACD(a2)) and closes\
      \ the branch"
    name: Branch closure
    points: 3
  title: Question 2
  type: short_answer
- id: q3
  max_points: 20
  rubric:
  - description: Demonstrates knowledge of sequent calculus rules used
    name: Understanding of Gentzen system
    points: 5
  - description: Correctly applies quantifier and propositional rules in the proof
    name: Proper application of rules
    points: 10
  - description: The sequent proof ends with the desired formula and no logical gaps
    name: Correctness of proof
    points: 5
  title: Question 3
  type: short_answer
- id: q4
  max_points: 20
  rubric:
  - description: Correctly cites the two given theorems at appropriate steps
    name: Use of given theorems
    points: 5
  - description: "Derives implications for both \xAC\u2200yp(y) \u2192 \u2203x(...)\
      \ and \u2200yp(y) \u2192 \u2203x(...)"
    name: Handling of two cases
    points: 5
  - description: Correctly uses deduction theorem and modus ponens
    name: Application of deduction theorem and MP
    points: 5
  - description: The Hilbert proof is complete and logically sound
    name: Overall correctness
    points: 5
  title: Question 4
  type: short_answer
- id: q5
  max_points: 15
  rubric:
  - description: "Correctly removes \u2192 using logical equivalences"
    name: Elimination of implications
    points: 4
  - description: Moves quantifiers to the front correctly
    name: Prenex form
    points: 4
  - description: Introduces Skolem functions for existential quantifiers
    name: Skolemization
    points: 4
  - description: Writes final set of clauses in clausal form
    name: Clausal form
    points: 3
  title: Question 5
  type: short_answer
- id: q6
  max_points: 15
  rubric:
  - description: Correctly sets up equations from the pair of atomic formulas
    name: Setting up equations
    points: 5
  - description: Applies substitutions step by step correctly
    name: Substitution steps
    points: 5
  - description: Provides correct most general unifier
    name: Final MGU
    points: 5
  title: Question 6
  type: short_answer
