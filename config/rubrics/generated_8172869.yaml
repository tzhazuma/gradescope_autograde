questions:
- id: q1
  max_points: 15
  rubric:
  - description: "The formula is correctly translated as \u2203x(Drinks(x) \u2192\
      \ \u2200y Drinks(y)) using appropriate predicates and quantifiers."
    name: Correct Translation
    points: 3
  - description: "Correctly handles Case 1 where \u2200y Drinks(y) is true, showing\
      \ that for any chosen a, Drinks(a) \u2192 \u2200y Drinks(y) holds because the\
      \ consequent is true."
    name: Case 1 Proof
    points: 4
  - description: "Correctly handles Case 2 where \xACDrinks(a) for some a, showing\
      \ that for that a, Drinks(a) \u2192 \u2200y Drinks(y) holds because the antecedent\
      \ is false."
    name: Case 2 Proof
    points: 4
  - description: Clearly concludes that the formula is valid because it holds in both
      exhaustive cases.
    name: Validity Conclusion
    points: 2
  - description: Explicitly states the assumption of a non-empty domain and provides
      a clear, logically sound explanation in natural language.
    name: Assumptions and Clarity
    points: 2
  title: 'Question 1: Translate to FOL and prove validity'
  type: short_answer
- id: q2
  max_points: 15
  rubric:
  - description: "Correctly writes the negated formula \xAC\u2203x(D(x) \u2192 \u2200\
      y D(y)) and rewrites it as \u2200x\xAC(D(x) \u2192 \u2200y D(y)) using duality."
    name: Correct Negation Setup
    points: 3
  - description: Properly instantiates universal quantifiers with constants (a1, a2),
      applies propositional rules for negated implication, and handles quantifier
      duality steps.
    name: Tableau Construction
    points: 6
  - description: "Correctly identifies the complementary pair D(a2) and \xACD(a2)\
      \ leading to a closed branch, and explains the closure."
    name: Contradiction Detection
    points: 4
  - description: Clearly concludes that the closed tableau proves the original formula
      is valid.
    name: Validity Conclusion
    points: 2
  title: 'Question 2: Semantic tableau for negation'
  type: short_answer
- id: q3
  max_points: 20
  rubric:
  - description: "Correctly sets up the initial sequent with the formula \u2203x(D(x)\
      \ \u2192 \u2200y D(y))."
    name: Sequent Setup
    points: 4
  - description: "Applies correct Gentzen rules (e.g., \u2203-right, \u2192-right,\
      \ \u2200-right) to decompose the formula, introduces constants, and builds the\
      \ proof tree."
    name: Proof Steps
    points: 10
  - description: "Reaches a valid end sequent (e.g., D(a2), \xACD(a2)) that demonstrates\
      \ the formula's validity."
    name: Final Derivation
    points: 4
  - description: Proof is clearly presented with proper sequencing and logical flow.
    name: Proof Structure
    points: 2
  title: 'Question 3: Gentzen system proof'
  type: short_answer
- id: q4
  max_points: 20
  rubric:
  - description: "Identifies the need to prove \u22A2\u2203x(p(x) \u2192 \u2200y p(y))\
      \ and plans the proof based on the two cases (\u2200y p(y) true or false)."
    name: Proof Strategy
    points: 4
  - description: "Correctly derives \u2200y p(y) \u2192 \u2203x(p(x) \u2192 \u2200\
      y p(y)) using assumptions and logical axioms."
    name: Case 1 Derivation
    points: 6
  - description: "Correctly derives \xAC\u2200y p(y) \u2192 \u2203x(p(x) \u2192 \u2200\
      y p(y)) using the given theorems, existential introduction, and logical steps."
    name: Case 2 Derivation
    points: 6
  - description: "Applies the given tautology to combine cases and conclude \u22A2\
      \u2203x(p(x) \u2192 \u2200y p(y))."
    name: Final Conclusion
    points: 2
  - description: Correctly cites and applies the two provided theorems without proof.
    name: Use of Given Theorems
    points: 2
  title: 'Question 4: Hilbert system proof'
  type: short_answer
- id: q5
  max_points: 15
  rubric:
  - description: "Correctly eliminates implications and moves negations inward to\
      \ obtain a prenex form (e.g., \u2200x\u2203y\u2203z(p(y) \u2228 \xACq(z) \u2228\
      \ r(x)))."
    name: Preprocessing
    points: 4
  - description: Properly Skolemizes existential quantifiers using functions dependent
      on universally quantified variables (e.g., y = f(x), z = g(x)).
    name: Skolemization
    points: 5
  - description: "Correctly expresses the PCNF as a set of clauses (e.g., {{p(f(x)),\
      \ \xACq(g(x)), r(x)}})."
    name: Clausal Form
    points: 4
  - description: Steps are logically sound and the final clausal form is correct and
      simplified.
    name: Clarity and Correctness
    points: 2
  title: 'Question 5: Transform to PCNF in clausal form'
  type: short_answer
- id: q6
  max_points: 15
  rubric:
  - description: 'Correctly sets up equations: a = y, x = f(z), f(g(y)) = f(z).'
    name: Initial Decomposition
    points: 3
  - description: Performs unification by solving equations step-by-step, updating
      substitutions, and correctly handling the occurs check (e.g., g(y) = z, z =
      g(a)).
    name: Substitution Steps
    points: 8
  - description: "Obtains the most general unifier: \xB5 = {x \u2190 f(g(a)), y \u2190\
      \ a, z \u2190 g(a)}."
    name: Final MGU
    points: 3
  - description: Steps are clearly presented with proper use of substitution notation.
    name: Clarity and Notation
    points: 1
  title: 'Question 6: Unification'
  type: short_answer
